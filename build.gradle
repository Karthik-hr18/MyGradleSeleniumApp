/*
 * Generated by Gradle init (compatible version)
 */

apply plugin: 'java'
apply plugin: 'application'

repositories {
    mavenCentral()   // better than jcenter (jcenter is deprecated)
}

dependencies {
    // Selenium
    implementation 'org.seleniumhq.selenium:selenium-java:4.21.0'

    // Optional: keep JUnit
    testImplementation 'junit:junit:4.12'
}

// Define main class (OLD STYLE)
mainClassName = 'App'
